<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café Aurora</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#f5f1ea;
      color:#333;
    }

    header{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:#e8dfd1;
    }

    header h1{
      font-size:4rem;
      margin-bottom:10px;
      letter-spacing:2px;
    }

    header p{
      font-size:1.2rem;
      margin-bottom:20px;
    }

    .btn{
      padding:12px 24px;
      background:#333;
      color:white;
      text-decoration:none;
      border-radius:8px;
      transition:0.3s;
    }

    .btn:hover{
      background:#555;
    }

    section{
      padding:80px 20px;
      max-width:1000px;
      margin:auto;
    }

    .menu{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:40px;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    .card h3{
      margin-bottom:10px;
    }

    footer{
      text-align:center;
      padding:30px;
      background:#ddd2c2;
    }
  </style>
</head>
<body>

  <header>
    <h1>Café Aurora</h1>
    <p>Café artesanal y ambiente minimalista</p>
    <a href="#menu" class="btn">Ver menú</a>
  </header>

  <section id="menu">
    <h2>Nuestro Menú</h2>

    <div class="menu">

      <div class="card">
        <h3>Espresso</h3>
        <p>Café intenso y aromático.</p>
      </div>

      <div class="card">
        <h3>Capuccino</h3>
        <p>Espuma cremosa y sabor suave.</p>
      </div>

      <div class="card">
        <h3>Latte Vainilla</h3>
        <p>Perfecto para tardes relajadas.</p>
      </div>

      <div class="card">
        <h3>Cheesecake</h3>
        <p>Postre artesanal del día.</p>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 Café Aurora</p>
  </footer>

</body>
</html>
